package: template-desktop-astro
path: template/desktop/astro
domain: desktop-template-astro
summary: Desktop Astro template with Tauri runtime, SQLite storage, and article editor flow.
llm_hint:
  - Use this file as a quick package capability map before reading code.
  - Treat listed features as stable entry points; verify details in src when implementing.
features:
  - desktop_article_list_r: render article list with @ui/shadcn list components
  - desktop_article_editor_c: open @features/editor modal and create article
  - desktop_sqlite_store_crud: persist article/user data through tauri sqlite plugin
