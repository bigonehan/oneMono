draft:
- name: node_package_workspace
  state: error
  type: action
  domain:
  - core
  depends_on: []
  scope: []
  rule:
  - 기존 모노레포 패키지 구조와 import 규칙을 유지한다.
  - 변경 범위는 `blog-personal` 폴더 내부와 해당 패키지 의존 경로로 제한한다.
  - 기존 `blog` 템플릿 구조와 글 저장 방식(`posts/`)을 깨지 않도록 현재 워크스페이스 경계를 먼저 확정한다.
  step:
  - 작업 대상 패키지, 기존 posts 읽기 로직, 글 생성 경로를 점검해 수정 가능한 파일 경계를 확정한다.
  - UI, API, 검증 변경이 기존 패키지 계약과 export 경로를 깨지 않도록 연결 지점을 유지한다.
  tasks:
  - implement node_package_workspace
  constraints:
  - 'node_package_workspace -> node_package_workspace : requirement 기반 draft item 생성'
  check:
  - verify node_package_workspace
- name: personal_blog_shell
  state: error
  type: action
  domain:
  - core
  depends_on: []
  scope: []
  rule:
  - 개인 블로그 느낌의 메인 화면, 공통 레이아웃, 반응형 스타일을 구성한다.
  - 메인 화면에 헤더, 소개, 대표 글, 최근 글, 카테고리 탐색, 글쓰기 진입을 포함한다.
  - 데이터 소스는 기존 posts 읽기 로직을 재사용하고 표현 계층 중심으로 연결한다.
  step:
  - 기존 메인 화면과 공통 레이아웃 구조를 읽고 개인 블로그형 정보 구조로 재배치한다.
  - 대표 글, 최근 글, 카테고리 탐색 섹션을 기존 posts 데이터와 연결해 첫 화면에 노출한다.
  - 반응형 스타일과 시맨틱 구조를 조정해 메인 화면 탐색 흐름을 완성한다.
  tasks:
  - implement personal_blog_shell
  constraints:
  - 'personal_blog_shell -> personal_blog_shell : requirement 기반 draft item 생성'
  check:
  - verify personal_blog_shell
- name: personal_blog_write_flow
  state: error
  type: action
  domain:
  - core
  depends_on: []
  scope: []
  rule:
  - 글쓰기 화면을 개인 블로그 문맥에 맞게 구성하되 기존 `WriteArticleForm`을 유지한다.
  - 입력 -> `/api/articles/create` -> 파일 저장 흐름을 유지하고 더미 성공 처리나 고정 반환을 추가하지 않는다.
  - 생성된 글이 실제 `posts/`에 저장되고 상세 및 목록 화면에서 다시 노출되도록 연결한다.
  step:
  - 기존 글쓰기 화면, `WriteArticleForm`, `/api/articles/create` 구현을 읽고 유지해야 할 계약을 확정한다.
  - 개인 블로그 문맥에 맞게 글쓰기 진입과 폼 구성을 정리하되 제출과 파일 저장 흐름은 그대로 연결한다.
  - 생성된 글이 `posts/` 저장 후 상세 화면과 목록 화면에 반영되는지 실제 경로 기준으로 점검한다.
  tasks:
  - implement personal_blog_write_flow
  constraints:
  - 'personal_blog_write_flow -> personal_blog_write_flow : requirement 기반 draft item 생성'
  check:
  - verify personal_blog_write_flow
- name: personal_blog_validation
  state: error
  type: action
  domain:
  - core
  depends_on: []
  scope: []
  rule:
  - ORC job/draft/check 체인, 타입체크, 빌드, Playwright, dev 서버 검증을 수행한다.
  - UI 작업이므로 트리거 입력 -> 핸들러 호출 -> 내부 로직 실행 -> 상태/파일 변경 -> 화면 재반영 경로를 실제 실행으로 확인한다.
  - 실패 시 같은 단계부터 재시도하고 실패 로그와 검증 결과를 남긴다.
  step:
  - ORC check 체인과 필수 검증 명령을 순서대로 실행해 실패 지점을 기록한다.
  - Playwright와 실제 파일 생성 검증으로 글쓰기 흐름과 메인 화면 반영 경로를 확인한다.
  - dev 서버 재기동과 최종 재검증으로 UI 및 저장 흐름이 모두 통과했는지 확인한다.
  tasks:
  - implement personal_blog_validation
  constraints:
  - 'personal_blog_validation -> personal_blog_validation : requirement 기반 draft item 생성'
  check:
  - verify personal_blog_validation
