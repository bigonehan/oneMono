draft:
- name: commentcreate
  type: action
  domain:
  - app
  depends_on: []
  scope:
  - web/next 모노레포 템플릿 패키지에서 app 도메인 action 타입 기능(commentcreate) 초기화 경로를 정의한다.
  - spec=auto, goal=init 기준으로 최소 구현 단위를 생성하고 연결한다.
  rule:
  - user.authenticated == true
  - content.length >= 1
  - content.length <= 500
  - content.trim().length >= 1
  - sanitize(content) != ''
  - request.method == 'POST'
  - db.comments.create exists
  step:
  - 사용자가 댓글 입력창에 내용을 입력한다
  - 등록 버튼 클릭 시 클라이언트가 길이/공백 유효성 검사를 수행한다
  - 클라이언트가 POST /api/posts/[postId]/comments 요청을 전송한다
  - 서버가 세션/토큰으로 사용자 인증을 확인한다
  - 서버가 sanitize 처리 후 댓글을 DB에 저장한다
  - 성공 응답 후 클라이언트가 댓글 목록을 리패치하거나 낙관적 업데이트를 반영한다
  tasks:
  - 댓글 작성 폼에 1~500자 및 trim 기준 공백-only 차단 검증을 구현한다
  - 댓글 등록 요청 payload와 postId를 포함한 API 호출 로직을 구현한다
  - 서버 API에서 비인증 요청 차단(401)과 인증 사용자 식별을 구현한다
  - 서버 API에서 sanitize 처리 및 저장 전 입력 검증을 구현한다
  - 댓글 레코드를 author/content/postId/createdAt 필드로 저장한다
  - 작성 성공 시 UI 목록 갱신(리패치 또는 optimistic update) 처리한다
  constraints:
  - '인증된 사용자 + 유효한 댓글 본문 -> 댓글 생성 성공 응답 : 로그인 사용자만 댓글 작성 가능'
  - '1~500자 범위 본문 -> 저장 허용 : 댓글 길이 제한 준수'
  - '빈 문자열 또는 공백-only 본문 -> 400 에러 응답 : 무의미한 댓글 등록 차단'
  - '스크립트/위험 태그 포함 본문 -> sanitize된 본문 저장 : XSS 위험 입력 방지'
  - '유효하지 않은 postId 또는 대상 게시글 없음 -> 404/400 에러 응답 : 잘못된 대상에 대한 생성 방지'
  check:
  - 비로그인 상태에서 댓글 작성 요청 시 401이 반환되는지 확인
  - 본문 길이 0자, 501자 입력 시 클라이언트/서버 모두 거부하는지 확인
  - 공백-only 입력이 차단되는지 확인
  - XSS 페이로드 입력 시 sanitize 결과로 저장되는지 확인
  - 정상 입력 시 DB에 author/content/postId/createdAt이 저장되는지 확인
  - 성공 후 댓글 목록이 즉시 갱신되는지 확인
- name: commentread
  type: action
  domain:
  - app
  depends_on: []
  scope:
  - web/next 패키지의 app 도메인에 action 타입 `commentread` 구현 경로를 정의한다.
  - init 목표에 맞춰 최소 구조(액션 엔트리, 입력 규칙 반영, 실행 연결)만 추가한다.
  rule:
  - 비로그인 요청 응답.status == 200
  - 응답 배열의 createdAt 정렬 == 오름차순
  - 초기 렌더 데이터 소스 contains SSR 또는 ISR
  - 페이지 크기 <= 20
  - 추가 요청 시 page 쿼리값 >= 2
  step:
  - 포스트 페이지 진입
  - SSR/ISR 또는 초기 fetch로 page=1 댓글 목록 요청
  - postId 기준 댓글 조회 및 createdAt 오름차순 정렬
  - 댓글 목록 컴포넌트 렌더링
  - 추가 페이지 요청으로 다음 댓글 목록 로딩 및 병합
  tasks:
  - GET /api/posts/[postId]/comments 엔드포인트에서 page 파라미터를 받아 댓글 20개 단위 조회를 구현한다.
  - 댓글 조회 로직에 postId 필터와 createdAt 오름차순 정렬을 적용한다.
  - 비로그인 사용자 접근 허용 정책으로 댓글 목록 조회 인증 예외를 적용한다.
  - 초기 댓글 목록을 SSR 또는 ISR 경로에서 주입해 첫 화면 렌더링을 구성한다.
  - 페이지네이션 또는 무한 스크롤로 추가 페이지 데이터를 요청하고 기존 목록에 이어 붙인다.
  constraints:
  - 'postId,page -> 댓글 목록(JSON) : 특정 게시글의 댓글을 페이지 단위로 조회한다'
  - '비로그인 요청 -> 200 응답 : 인증 없이 댓글 읽기 기능을 제공한다'
  - '댓글 집합 -> createdAt 오름차순 목록 : 최신 댓글이 하단에 위치하도록 정렬한다'
  - '초기 페이지 진입 -> 서버 기반 초기 목록 렌더 : SSR/ISR로 초기 로딩 성능과 노출을 보장한다'
  - 'page 증가 요청 -> 기존 목록 + 추가 목록 : 연속 스크롤/페이지네이션으로 목록을 확장한다'
  check:
  - 비로그인 상태에서 page=1 요청 시 댓글 목록이 반환되는지 확인
  - 반환된 댓글의 createdAt이 오름차순인지 확인
  - 초기 화면에 SSR/ISR로 댓글 목록이 렌더되는지 확인
  - 페이지당 최대 20개만 내려오는지 확인
  - page=2 이상 추가 요청 시 기존 목록 뒤에 정상 병합되는지 확인
- name: commentupdate
  type: action
  domain:
  - app
  depends_on: []
  scope:
  - web/next 모노레포 템플릿에서 app 도메인의 action 타입 기능 `commentupdate` 구현 경로를 확정한다.
  - 입력 검증 규칙(input_rules)과 처리 단계(input_steps)를 기준으로 코멘트 수정 요청의 서버 액션 흐름을 완성한다.
  - 최소 변경 원칙으로 기존 init 골을 유지하며 comment update 기능만 추가한다.
  rule: []
  step:
  - 1. 본인 댓글의 "수정" 버튼 클릭
  - 2. 댓글 영역이 인라인 편집 모드(textarea)로 전환
  - 3. 내용 수정 후 "저장" 버튼 클릭
  - 4. 클라이언트 유효성 검사
  - 5. `PATCH /api/comments/[commentId]` 요청
  - 6. 서버에서 요청자 == 작성자 여부 검증
  - 7. DB 업데이트 후 `updatedAt` 갱신
  - 8. UI 업데이트 및 편집 모드 종료
  tasks:
  - '`app/actions/commentupdate.ts`에 `commentupdate` 서버 액션을 추가하고 `project_md.name=web/next`, `domain=app`, `type=action`에 맞는 엔트리 포인트를 고정한다.'
  - '`app/actions/commentupdate.schema.ts`에 입력 스키마를 정의해 `input_rules`를 코드로 강제한다.'
  - '`app/actions/commentupdate.steps.ts`에 `input_steps` 순서를 반영한 처리 파이프라인(조회 -> 권한/유효성 확인 -> 업데이트 -> 결과 반환)을 구현한다.'
  - '`app/actions/index.ts` 또는 기존 액션 레지스트리에 `commentupdate`를 등록해 실제 호출 경로를 연결한다.'
  - '기존 코멘트 저장소 계층(예: repository/service)에 update 메서드가 없으면 최소 단위로 추가하고 액션에서 호출한다.'
  constraints: []
  check:
  - '`commentupdate` 입력 유효성 실패/성공 케이스를 포함한 테스트를 추가하거나 기존 테스트 파일에 케이스를 확장한다.'
  - '`rg "commentupdate" app`으로 트리거 -> 액션 -> 내부 로직 -> 상태 변경 경로가 모두 연결됐는지 확인한다.'
  - '프로젝트 표준 검증 명령(예: `pnpm test`, `pnpm lint`)을 실행해 실패 없이 통과 여부를 확인한다.'
  - 반환 데이터 형식이 액션 계약과 일치하는지 확인하고 회귀 영향이 없는지 점검한다.
- name: commentdelete
  type: action
  domain:
  - app
  depends_on: []
  scope:
  - app 도메인의 commentdelete 액션 구현 경로를 src/app/actions/commentdelete.ts로 정의한다.
  - 삭제 요청 진입점은 댓글 상세/목록 UI에서 서버 액션 호출로 연결한다.
  - 데이터 계층은 기존 댓글 저장소/ORM 모듈을 재사용해 단일 삭제 책임만 추가한다.
  rule: []
  step:
  - 1. 댓글의 "삭제" 버튼 클릭
  - 2. 확인 모달("정말 삭제하시겠습니까?") 표시
  - 3. 확인 클릭 시 `DELETE /api/comments/[commentId]` 요청
  - 4. 서버에서 요청자 권한 검증 (본인 or admin)
  - 5. DB에서 소프트 삭제 처리
  - 6. 댓글 목록에서 해당 항목 UI 업데이트
  tasks:
  - src/app/actions/commentdelete.ts에 입력 검증(id, 권한)과 삭제 실행 로직을 구현한다.
  - 댓글 UI 트리거 파일에서 commentdelete 액션을 import해 호출 경로를 연결한다.
  - 삭제 성공/실패 결과를 호출부에서 처리할 수 있도록 액션 반환 포맷을 통일한다.
  - 필요 시 app 도메인 문서에 commentdelete 액션 입력 규칙과 실행 단계(input_rules, input_steps)를 추가한다.
  constraints: []
  check:
  - UI 트리거 -> commentdelete 액션 호출 -> 저장소 삭제 실행 -> 화면 재반영 흐름이 실제로 동작한다.
  - 유효하지 않은 id, 권한 없음, 대상 없음 케이스에서 실패 응답이 일관되게 반환된다.
  - 관련 테스트 또는 실행 검증 명령에서 commentdelete 경로가 통과한다.
- name: commentreply
  type: action
  domain:
  - app
  depends_on: []
  scope:
  - web/next 모노레포 템플릿에서 app 도메인의 action 타입 기능 `commentreply` 구현 경로를 확정한다.
  - '`commentreply`를 사용자 입력 처리 기반 액션으로 추가하고 호출 가능한 엔트리 포인트를 연결한다.'
  rule: []
  step:
  - 1. 댓글의 "답글" 버튼 클릭
  - 2. 해당 댓글 하단에 대댓글 입력창 노출
  - 3. 내용 작성 후 "등록" 클릭
  - 4. `POST /api/comments/[parentId]/replies` 요청
  - 5. DB에 `parentId` 포함하여 저장
  - 6. 부모 댓글 하위에 대댓글 렌더링
  tasks:
  - 'app 액션 디렉터리(예: `apps/web/src/app/actions` 또는 동등 경로)에 `commentreply` 액션 파일을 생성한다.'
  - '`commentreply` 입력 스키마/파라미터 규칙을 정의하고 액션 핸들러에서 검증 후 실행하도록 구현한다.'
  - 댓글 답글 생성 로직을 도메인 함수로 분리해 액션에서 호출하고 결과 타입을 반환한다.
  - UI/서버 트리거 지점(폼 submit, API route, server action 중 현재 구조에 맞는 경로)에서 `commentreply` 액션을 연결한다.
  - 기능 추가 완료 후 `./.agents/log.md`에 완료 기록 `## 날짜 - 작업한일` 형식으로 1건 추가한다.
  constraints: []
  check:
  - '정적 점검: `commentreply` 식별자가 액션 등록/호출 경로에서 실제 참조되는지 `rg "commentreply"`로 확인한다.'
  - '실행 점검: 프로젝트 표준 검사 명령(예: `pnpm lint` 또는 `pnpm test`)을 실행해 통과 여부를 확인한다.'
  - '흐름 점검: UI 트리거 입력 -> 액션 핸들러 -> 내부 로직 -> 상태/파일 변경 -> 화면 재반영 경로가 실제로 연결되는지 검증한다.'
