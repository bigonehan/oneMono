package: @ui/shadcn
path: packages/ui/shadcn
domain: ui-shadcn
summary: Shadcn-based composed UI components for forms/layout/list.
llm_hint:
  - Use this file as a quick package capability map before reading code.
  - Treat listed features as stable entry points; verify details in src when implementing.
features:
  - layout_components: header/footer/navigation components
  - form_components: login/editor forms
  - list_components: article list and card rendering
  - blog_showcase_list_r: featured plus grid list cards for blog landing pages
  - blog_card_list_grid_r: card_item plus card_list grid composition for blog feeds
